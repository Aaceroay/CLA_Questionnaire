<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwCzYFhjWjB_f6eAzfJNX8seos7CqFWYQM42zDHmMulGIdkX_tUTQdgqTKJSsgwBVZItw/exec';

/* ================= QUESTIONS ================= */
const QUESTIONS = [
  {id:1, factor:1, text:"People from Spain speak the purest form of Spanish.", reversed:true},
  {id:2, factor:1, text:"In my opinion, people should use standard Spanish to communicate all the time.", reversed:true},
  {id:3, factor:1, text:"I believe Spanish-speaking Hispanics in the U.S. don't speak correct Spanish.", reversed:true},
  {id:4, factor:1, text:"I feel speaking Spanish is less prestigious than speaking other foreign languages such as French.", reversed:true},
  {id:5, factor:1, text:"In my opinion, speaking English is an essential element of being American.", reversed:true},
  {id:6, factor:1, text:"In my opinion, it's more important for immigrants to learn English and adopt the American culture than to keep their own language and culture.", reversed:true},
  {id:7, factor:1, text:"In my opinion, families can speak Spanish among themselves at home but when in public they should speak English to each other.", reversed:true},
  {id:8, factor:1, text:"I believe growing up with both Spanish and English confuses children.", reversed:true},
  {id:9, factor:1, text:"If I were to address an audience in a professional environment, I would try to avoid working with a partner who has a strong foreign accent in English.", reversed:true},
  {id:10, factor:2, text:"I believe people who speak Spanglish should switch to just Spanish or English.", reversed:true},
  {id:11, factor:2, text:"I don't like it when people say 'parquear' instead of 'estacionar'.", reversed:true},
  {id:12, factor:2, text:"I don't like it when people code-switch because it is not a proper way of speaking a language.", reversed:true},
  {id:13, factor:2, text:"I believe Spanglish should not be allowed in Spanish classes.", reversed:true},
  {id:14, factor:2, text:"I would tease a friend when speaking Spanish if they forget or invent words.", reversed:true},
  {id:15, factor:2, text:"I would try to avoid mixing Spanish and English in the same conversation as much as I can.", reversed:true},
  {id:16, factor:2, text:"I would not code-switch in front of an L1 or fluent speaker of Spanish because this person may think I am less intelligent.", reversed:true},
  {id:17, factor:3, text:"I would be willing to join a club or association that meets regularly to discuss how to maintain Spanish within the family and community.", reversed:false},
  {id:18, factor:3, text:"After finishing taking Spanish language lessons, I would commit to reading, writing, speaking, and listening in Spanish every day to continue developing my language.", reversed:false},
  {id:19, factor:3, text:"I would speak to Hispanic people in my environment about keeping Spanish alive.", reversed:false},
];

const FACTORS = {
  1:{name:"Language variation, prejudice & English hegemony", cls:"f1", fillCls:"f1-fill"},
  2:{name:"Bilingualism, Spanglish & code-switching", cls:"f2", fillCls:"f2-fill"},
  3:{name:"Language maintenance & advocacy", cls:"f3", fillCls:"f3-fill"},
};

const LEVELS = [
  {min:1.0,max:2.49,level:1,name:"Nascent Awareness",cls:"diag-1"},
  {min:2.5,max:3.49,level:2,name:"Emerging Awareness",cls:"diag-2"},
  {min:3.5,max:4.49,level:3,name:"Developing Awareness",cls:"diag-3"},
  {min:4.5,max:5.19,level:4,name:"Consolidated Awareness",cls:"diag-4"},
  {min:5.2,max:6.0,level:5,name:"Advanced Awareness",cls:"diag-5"},
];

let sessionType='PRE';
const answers={};

/* ================= FIX: CONSENT LISTENER ================= */
document.addEventListener('DOMContentLoaded',()=>{
  const c=document.getElementById('consent-check');
  if(c){
    c.addEventListener('change', updateFooter);
  }
});

/* ================= NAV ================= */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startQuiz(){
  buildQuiz();
  showScreen('screen-quiz');
}

/* ================= QUIZ ================= */
function buildQuiz(){
  let html='';
  QUESTIONS.forEach(q=>{
    html+=`
    <div class="q-card" id="qc-${q.id}">
      <p class="q-text">${q.text}</p>
      <div class="scale-options">
        ${[1,2,3,4,5,6].map(v=>`
          <label>
            <input type="radio" name="q${q.id}" value="${v}"
            onchange="recordAnswer(${q.id},${v})">
            ${v}
          </label>`).join('')}
      </div>
    </div>`;
  });
  document.getElementById('quiz-body').innerHTML=html;
  updateFooter();
}

function recordAnswer(id,val){
  answers[id]=val;
  updateFooter();
}

/* ================= FIXED FOOTER LOGIC ================= */
function updateFooter(){
  const n=Object.keys(answers).length;
  const consent=document.getElementById('consent-check')?.checked;

  document.getElementById('answered-count').innerHTML=`<strong>${n}</strong> of 19 answered`;

  const btn=document.getElementById('btn-submit');
  if(btn) btn.disabled = !(n===19 && consent);
}

/* ================= SCORING ================= */
function computeScores(){
  const adj={};
  QUESTIONS.forEach(q=>{
    adj[q.id]=q.reversed?7-answers[q.id]:answers[q.id];
  });

  const avg=a=>a.reduce((x,y)=>x+y,0)/a.length;

  return {
    f1:avg(QUESTIONS.filter(q=>q.factor===1).map(q=>adj[q.id])),
    f2:avg(QUESTIONS.filter(q=>q.factor===2).map(q=>adj[q.id])),
    f3:avg(QUESTIONS.filter(q=>q.factor===3).map(q=>adj[q.id])),
    overall:avg(Object.values(adj)),
    adj
  };
}

function getLevel(score){
  return LEVELS.find(l=>score>=l.min&&score<=l.max)||LEVELS[0];
}

/* ================= SUBMIT ================= */
function submitQuiz(){
  const scores=computeScores();
  const level=getLevel(scores.overall);
  buildResults(scores,level);
  showScreen('screen-results');
  sendToSheet(scores,level);
}

/* ================= GOOGLE SHEETS ================= */
async function sendToSheet(scores, level, profile){
  const el = document.getElementById('save-status');
  if(!el) return;

  el.className = 'save-status saving';
  el.innerHTML = 'Saving to Google Sheets...';

  const payload = {
    timestamp: new Date().toISOString(),
    session: sessionType,

    ...profile,

    score_f1: scores.f1.toFixed(3),
    score_f2: scores.f2.toFixed(3),
    score_f3: scores.f3.toFixed(3),
    score_overall: scores.overall.toFixed(3),

    cla_level: level.level,
    cla_level_name: level.name,

    ...Object.fromEntries(QUESTIONS.map(q => [`q${q.id}_raw`, answers[q.id]])),
    ...Object.fromEntries(QUESTIONS.map(q => [`q${q.id}_adj`, scores.adj[q.id]]))
  };

  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      body: new URLSearchParams({
        data: JSON.stringify(payload)
      })
    });

    el.className = 'save-status saved';
    el.innerHTML = 'Responses saved successfully to Google Sheets.';
  } catch (e) {
    console.error(e);
    el.className = 'save-status error';
    el.innerHTML = 'Could not save to Google Sheets (check Apps Script deployment).';
  }
}

/* ================= RESULTS ================= */
function buildResults(scores,level){
  document.getElementById('results-inner').innerHTML=`
    <h2>Your score: ${scores.overall.toFixed(2)}</h2>
    <p>${level.name}</p>
  `;
}
</script>
